openapi: 3.0.3
info:
  title: Example API
  version: "1.0.0"
servers:
  - url: http://example.com
paths:
  /:
    get:
      operationId: getExampleHome
      summary: Fetch example.com homepage content
      responses:
        "200":
          description: Home page response
          content:
            text/html:
              schema:
                type: string
