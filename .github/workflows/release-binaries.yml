name: Release Binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-mcp:
    uses: greenticai/.github/.github/workflows/release-binaries.yml@main
    with:
      package: greentic-mcp
      binary: greentic-mcp
      extra-files: |
        README.md
    secrets: inherit

  release-mcp-exec:
    uses: greenticai/.github/.github/workflows/release-binaries.yml@main
    with:
      package: greentic-mcp-exec
      binary: greentic-mcp-exec
      extra-files: |
        README.md
    secrets: inherit

  publish_crates:
    name: Publish to crates.io
    needs: [release-mcp, release-mcp-exec]
    permissions:
      contents: read
    uses: greenticai/.github/.github/workflows/crates-publish.yml@main
    with:
      crates: "greentic-mcp-exec greentic-mcp"
    secrets: inherit
