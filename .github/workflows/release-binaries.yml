name: Release binaries (binstall)

on:
  workflow_call:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-apple-darwin
            os: macos-15
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          targets: ${{ matrix.target }}
      - name: Ensure tag matches cargo workspace version
        shell: bash
        run: |
          set -euox pipefail
          local_version=$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | select(.name=="greentic-mcp") | .version')
          tag_name="${GITHUB_REF_NAME}"
          expected_tag="v${local_version}"
          if [[ "$tag_name" != "${expected_tag}" ]]; then
            echo "::error::Release tag ${tag_name} does not match cargo workspace version ${local_version}"
            echo "::error::Expected release tag ${expected_tag}"
            exit 1
          fi
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: greentic-mcp
          target: ${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: greentic-mcp-exec
          target: ${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}
