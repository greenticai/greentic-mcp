name: Release binaries (binstall)

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-binaries-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-apple-darwin
            os: macos-15
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          targets: ${{ matrix.target }}
      - uses: taiki-e/upload-rust-binary-action@v1
        env:
          GITHUB_REF: refs/tags/${{ inputs.release_tag }}
          GITHUB_REF_NAME: ${{ inputs.release_tag }}
        with:
          bin: greentic-mcp
          target: ${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: taiki-e/upload-rust-binary-action@v1
        env:
          GITHUB_REF: refs/tags/${{ inputs.release_tag }}
          GITHUB_REF_NAME: ${{ inputs.release_tag }}
        with:
          bin: greentic-mcp-exec
          target: ${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}
