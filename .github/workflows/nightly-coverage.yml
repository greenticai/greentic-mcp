name: Nightly coverage

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setup:
    uses: greenticai/.github/.github/workflows/ci.yml@main
    secrets: inherit

  coverage:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          toolchain: 1.91.0
      - name: Install cargo binstall
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-binstall
      - name: Install coverage tooling
        run: |
          cargo binstall --no-confirm cargo-llvm-cov cargo-nextest
      - name: Run coverage
        run: greentic-dev coverage
