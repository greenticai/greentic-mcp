name: publish

on:
  push:
    branches: [main]
  workflow_dispatch:

# Keep this workflow easy to retrigger via a minimal follow-up PR when needed.
permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  release-tag:
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release_tag.outputs.tag }}
      version: ${{ steps.release_tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
      - name: Resolve release tag from workspace version
        id: release_tag
        run: |
          set -euo pipefail
          version=$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | select(.name=="greentic-mcp") | .version')
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

  release-binaries:
    needs: [ci, release-tag]
    uses: ./.github/workflows/release-binaries.yml
    with:
      release_tag: ${{ needs.release-tag.outputs.tag }}
      release_version: ${{ needs.release-tag.outputs.version }}
    secrets: inherit

  publish:
    needs: [release-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
      - uses: Swatinem/rust-cache@v2
      - name: Publish changed crates
        uses: katyo/publish-crates@v2
        with:
          path: .
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          ignore-unpublished-changes: true   # succeed when nothing to publish
          check-repo: true                   # verify real version bumps
          dry-run: false
