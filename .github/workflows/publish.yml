name: publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  release-tag:
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release_tag.outputs.tag }}
      version: ${{ steps.release_tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
      - name: Resolve release tag from workspace version
        id: release_tag
        run: |
          set -euo pipefail
          version=$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | select(.name=="greentic-mcp") | .version')
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

  publish:
    outputs:
      publish: ${{ steps.check.outputs.publish }}
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
      - uses: Swatinem/rust-cache@v2
      - name: Check crates.io versions (skip if already published)
        id: check
        run: |
          set -euo pipefail
          crates=("greentic-mcp-exec" "greentic-mcp")
          publish=false
          metadata=$(cargo metadata --format-version 1 --no-deps)
          ua="greentic-publish-check/1.0 (github-actions)"
          for crate in "${crates[@]}"; do
            local_ver=$(printf '%s' "$metadata" | jq -r '.packages[] | select(.name=="'"$crate"'") | .version')
            resp=$(curl -s -H "User-Agent: ${ua}" -w "%{http_code}" -o /tmp/crate.json "https://crates.io/api/v1/crates/${crate}" || true)
            if [ "$resp" = "200" ]; then
              remote_ver=$(jq -r '.crate.max_version // ""' /tmp/crate.json)
            else
              echo "crates.io lookup for ${crate} failed with HTTP ${resp}; assuming not published"
              remote_ver=""
            fi
            if [ "$local_ver" != "$remote_ver" ]; then
              publish=true
              echo "needs_${crate//=/_}=true" >> "$GITHUB_OUTPUT"
            else
              echo "needs_${crate//=/_}=false" >> "$GITHUB_OUTPUT"
            fi
          done
          echo "publish=$publish" >> "$GITHUB_OUTPUT"

      # Idempotent crates.io publish: only publishes when versions changed.
      - name: Publish changed crates
        if: steps.check.outputs.publish == 'true'
        uses: katyo/publish-crates@v2
        with:
          path: .
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          ignore-unpublished-changes: true   # succeed when nothing to publish
          check-repo: true                   # verify real version bumps
          dry-run: false

  release-binaries:
    if: needs.publish.outputs.publish == 'true'
    needs: [publish, release-tag]
    uses: ./.github/workflows/release-binaries.yml
    with:
      release_tag: ${{ needs.release-tag.outputs.tag }}
      release_version: ${{ needs.release-tag.outputs.version }}
      publish_changed: ${{ needs.publish.outputs.publish }}
    secrets: inherit
